on: [push, pull_request]

name: Build from SVN

concurrency:
  group: ${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  R_CRAN_WEB: "https://cran.rstudio.com"
  CRAN_MIRROR: "cran.rstudio.com"

jobs:
  windows:
    name: Windows
    runs-on: ${{matrix.arch == 'aarch64' && 'windows-11-arm' || 'windows-latest'}}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        arch: [ 'x86_64', 'aarch64']
    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 100

    - name: Checkout
      uses: ./.github/checkout

    - name: Setup Build Tooling
      uses: ./.github/setup-windows-tools

    - name: Build R-base
      uses: ./.github/build-r-windows

    - name: Test Installer
      run: |
        Get-Item "src/gnuwin32/installer/R-*-win.exe" | Rename-Item -NewName { $_.Name -replace 'win\.exe$', '${{matrix.arch }}.exe' }
        .\src\gnuwin32\installer\R-*.exe /SILENT
      shell: powershell

    - name: Save installer
      uses: actions/upload-artifact@v6
      with:
        name: Win-installer-${{matrix.arch}}
        path: src/gnuwin32/installer/R-*.exe

    - name: Run checks
      run: |
        cd src/gnuwin32
        export TAR="/usr/bin/tar"
        export TAR_OPTIONS="--force-local"
        export PATH="/c/rtools-base-toolchain/bin:/c/Users/$USER/AppData/Roaming/TinyTeX/bin/windows:$PATH"
        make check-all
      shell: msys2 {0}

    - name: Print failed tests
      if: failure()
      run: tail -n100 tests/*.fail tests/Examples/*.fail 

  linux:
    name: Linux
    runs-on: ubuntu-24.04${{matrix.ARCH == 'arm' && '-arm' || ''}}
    container:
      image: ${{matrix.OS}}
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        CC: [ gcc, clang ]
        OS: [ 'debian:stable', 'debian:testing' ]
        ARCH: [ 'intel', 'arm']
    steps:
    - name: System dependencies
      run: |
        set -e
        apt-get update -y
        apt-get install -y ${{matrix.CC}} curl wget locales git rsync gfortran xvfb autoconf pkg-config texinfo texlive-latex-extra texlive-fonts-recommended tk8.6-dev dpkg-dev \
        libcurl4-openssl-dev libblas-dev libbz2-dev libicu-dev libjpeg-dev liblapack-dev liblzma-dev libncurses5-dev libpcre2-dev libpng-dev libtiff-dev libcairo2-dev libpango1.0-dev libreadline-dev libxt-dev
        localedef -i en_US -f UTF-8 en_US.UTF-8
        echo "LANG=en_US.UTF-8" >> $GITHUB_ENV

    - uses: actions/checkout@v6
      with:
        fetch-depth: 100

    - name: Checkout
      uses: ./.github/checkout

    - name: Configure
      run: CC=${{matrix.CC}} ./configure --enable-R-shlib --with-blas --with-lapack --enable-werror --disable-java

    - name: Build R
      run: make

    - name: Run checks
      run: xvfb-run make check-all

    - name: Print failed tests
      if: failure()
      run: tail -n100 tests/*.fail tests/Examples/*.fail || true

  macos:
    name: MacOS
    strategy:
      fail-fast: false
      matrix:
        OS: [ 'macOS-26', 'macOS-26-intel' ]
    runs-on: ${{matrix.OS}}
    timeout-minutes: 120
    env:
      R_TEXI2DVICMD: emulation
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 100

    - name: Checkout
      uses: ./.github/checkout

    - name: Setup Build Tooling
      uses: ./.github/setup-macos-tools

    - name: Configure
      run: |
        export CC=clang
        export CPPFLAGS="-I/opt/R/$(uname -m)/include"
        export LDFLAGS="-L/opt/R/$(uname -m)/lib"
        export PKG_CONFIG_PATH="/opt/R/$(uname -m)/lib/pkgconfig:/opt/R/$(uname -m)/share/pkgconfig"
        if [ "$(uname -m)" = "arm64" ]; then
          ACCELERATE="--with-lapack --with-blas"
        fi
        ./configure --prefix=/opt/R/$(uname -m)/r-devel --disable-java --with-cairo --without-tcltk --without-x --with-aqua $ACCELERATE --enable-R-shlib SED=/usr/bin/sed

    - name: Build R
      run: make

    - name: Run checks
      run: make check-all

    - name: Print failed tests
      if: failure()
      run: tail -n100 tests/*.fail tests/Examples/*.fail || true
