name: 'Checkout Source'
description: 'Checkout R source from the git-svn mirror'

runs:
  using: "composite"
  steps:
    - name: Prepare git
      run: |
        git config --global core.autocrlf false
        git config --global --add safe.directory $PWD || true
      shell: bash

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 100

    - name: Prepare source
      run: |
        $GITHUB_ACTION_PATH/git-svn-info.sh | tee -a SVNINFO | tee -a SVN-REVISION
        tools/fetch-recommended
        $GITHUB_ACTION_PATH/update-recommended.sh
      shell: bash
